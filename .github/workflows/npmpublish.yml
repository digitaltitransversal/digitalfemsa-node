name: publish on npm
on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org/
      - name: Check if release creator is a code owner
        run: |
          if [[ $(jq '.sender.type' $GITHUB_EVENT_PATH) == '"User"' ]]; then
            creator_login=${{ github.event.release.author.login }}
            if ! grep -q $creator_login .github/CODEOWNERS; then
              echo "Release creator is not a code owner, skipping the rest of the workflow."
              exit 1
            fi
          fi
      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
      - name: Validate npm publish access
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          NPM_USER=$(npm whoami)
          echo "Authenticated to npm as $NPM_USER for package $PACKAGE_NAME."

          if ! npm owner ls "$PACKAGE_NAME" | tee /tmp/npm-owners.txt | grep -Eiq "^$NPM_USER[[:space:]]"; then
            echo "The npm token user '$NPM_USER' is not an owner of '$PACKAGE_NAME'."
            echo "Ask an existing owner to run: npm owner add $NPM_USER $PACKAGE_NAME"
            exit 1
          fi

      - run: |
          npm ci
          npm run build
          VERSION=$(node -p "require('./package.json').version" )
          # Only publish stable versions to the latest tag
          if [[ "$VERSION" =~ ^[^-]+$ ]]; then
            NPM_TAG="latest"
          else
            NPM_TAG="beta"
          fi
          echo "Publishing $VERSION with $NPM_TAG tag." 
          npm publish --tag $NPM_TAG
        env:
          GITHUB_TOKEN: ${{ secrets.USER_GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
